# Agent Configuration File
# This file defines the agent's connection settings and allowed commands

# Connection info
server:
  host: "127.0.0.1"
  port: 8080  # Unified port for connecting to server (both gRPC and HTTP)
  password: "your_password"

agent:
  name: "Node 1"
  group: "Location A"
  details:
    location: "Earth"
    datacenter: "DEEPDARK 1"
    test_ip: "11.4.5.14"
    description: "Your node info"

log:
  log_level: "info"

# Command templates - flexible command definitions
# Only these commands can be executed by this agent
commands:
  ping:
    template: "ping -c 4"
  tcping:
    use_plugin: "tcping"
  udping:
    use_plugin: "udping"
  mtr:
    use_plugin: "mtr"
  nexttrace:
    template: "nexttrace -eM"
  geekbench6:
    use_plugin: "geekbench6"
    ignore_target: true
  
