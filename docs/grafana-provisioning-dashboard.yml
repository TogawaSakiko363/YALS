# Grafana dashboard provisioning for YALS NR.
# Place this file at: /etc/grafana/provisioning/dashboards/yals.yml
# and copy grafana-dashboard.json into the `path` directory below.
#
# NOTE: provisioned dashboards substitute the ${DS_PROMETHEUS} input via the
# `datasources` mapping (the value is the data source UID from
# grafana-provisioning-datasource.yml).

apiVersion: 1

providers:
  - name: "YALS"
    orgId: 1
    folder: "YALS"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/yals
      foldersFromFilesStructure: false

# When provisioning the dashboard JSON that uses __inputs, map the input name to
# the data source UID so Grafana resolves ${DS_PROMETHEUS} automatically:
#   datasources:
#     DS_PROMETHEUS: prometheus-yals
