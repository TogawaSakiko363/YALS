# YALS Server Configuration

# Server settings
server:
  host: "0.0.0.0"
  port: 8080  # Unified port for both gRPC (agent connections) and HTTP (web interface)
  password: "your_password"
  log_level: "info"  # debug, info, warn, error
  tls_cert_file: "./cert.pem"  # Path to TLS certificate file (auto-generated if missing)
  tls_key_file: "./key.pem"    # Path to TLS private key file (auto-generated if missing)
  # Only enable when behind a trusted reverse proxy that sets X-Real-IP /
  # X-Forwarded-For. When false (default) the real connection address is used for
  # logging and rate limiting, preventing clients from spoofing these headers.
  trust_proxy_headers: false
  # Prometheus metrics. When metrics_enabled is true the server exposes a
  # /metrics endpoint aggregating the status of all agents (pull/scrape model).
  # If metrics_token is set, scrapers must send "Authorization: Bearer <token>";
  # otherwise restrict the endpoint at the network layer.
  metrics_enabled: false
  metrics_token: ""

# Database settings
database:
  path: "./data/yals.db"
